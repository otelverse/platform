name: CI

on:
  push:
    branches: [feature/*, develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.8.1
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Run all tests
        run: bazel test //...

  build-edge-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build for aarch64
        run: cd packages/edge-agent/agent && cross build --target aarch64-unknown-linux-gnu --release

      - name: Build for armv7
        run: cd packages/edge-agent/agent && cross build --target armv7-unknown-linux-gnueabihf --release
