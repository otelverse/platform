name: Security Scans

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

jobs:
  gosec:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

  cargo-audit:
    name: Rust Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo-audit
        run: |
          find . -name Cargo.toml -execdir cargo audit \;

  npm-audit:
    name: Node Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run npm audit
        run: |
          find . -name package.json -not -path "*/node_modules/*" -execdir npm audit --audit-level=high \; || echo "Audit warnings found"
