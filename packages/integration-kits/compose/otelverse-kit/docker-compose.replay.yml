version: '3.8'

services:
  session-replay:
    build:
      context: ../../../
      dockerfile: packages/session-replay/service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - POSTGRES_DSN=postgres://postgres:password@db:5432/replay?sslmode=disable
      - DATA_DIR=/data/replays
    volumes:
      - replay_data:/data/replays
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=replay
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Example app to record sessions
  demo-app:
    build:
      context: ./apps/react-app
    ports:
      - "5174:5174"
    environment:
      - REPLAY_SERVICE_URL=http://session-replay:8082
    depends_on:
      - session-replay

volumes:
  replay_data:
