version: "3.9"

networks:
  otelverse-network:
    driver: bridge

services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "${CLICKHOUSE_PORT}:9000"
    environment:
      CLICKHOUSE_DB: default
    networks:
      - otelverse-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.95.0
    ports:
      - "${VM_PORT}:8428"
    command:
      - "-storageDataPath=/storage"
      - "-httpListenAddr=:8428"
    networks:
      - otelverse-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    ports:
      - "${OTLP_GRPC_PORT}:4317"
      - "${OTLP_HTTP_PORT}:4318"
    volumes:
      - ../../../unified-platform/docker/otel-collector-config.yml:/etc/otel-collector-config.yml
    command: ["--config=/etc/otel-collector-config.yml"]
    networks:
      - otelverse-network
    depends_on:
      clickhouse:
        condition: service_healthy
      victoria-metrics:
        condition: service_healthy

  platform:
    build:
      context: ../../../unified-platform
      dockerfile: docker/Dockerfile
    ports:
      - "${PLATFORM_PORT}:8080"
    environment:
      PORT: "8080"
      CLICKHOUSE_DSN: "clickhouse://clickhouse:9000?username=default&password="
      OTLP_ADDR: ":4317"
    networks:
      - otelverse-network
    depends_on:
      clickhouse:
        condition: service_healthy

  express-app:
    build:
      context: ./apps/express-app
      dockerfile: Dockerfile
    ports:
      - "${EXPRESS_PORT}:3001"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: express-app
    networks:
      - otelverse-network
    depends_on:
      otel-collector:
        condition: service_started

  react-app:
    build:
      context: ./apps/react-app
      dockerfile: Dockerfile
    ports:
      - "${REACT_PORT}:5173"
    networks:
      - otelverse-network
    depends_on:
      express-app:
        condition: service_started

  session-replay-service:
    build:
      context: ../../../../
      dockerfile: packages/session-replay/service/Dockerfile
    ports:
      - "${REPLAY_PORT}:8082"
    environment:
      CLICKHOUSE_DSN: "clickhouse://clickhouse:9000?username=default&password="
      PORT: "8082"
    networks:
      - otelverse-network
    depends_on:
      clickhouse:
        condition: service_healthy

  chaos-agent:
    build:
      context: ../../../../
      dockerfile: packages/chaos-engine/agent/Dockerfile
    ports:
      - "${CHAOS_PORT}:8083"
    environment:
      PLATFORM_URL: "http://platform:8080"
      PORT: "8083"
    networks:
      - otelverse-network
    depends_on:
      platform:
        condition: service_started

  edge-control:
    build:
      context: ../../../../
      dockerfile: packages/edge-agent/control/Dockerfile
    ports:
      - "${EDGE_PORT}:8084"
    environment:
      CLICKHOUSE_DSN: "clickhouse://clickhouse:9000?username=default&password="
      PORT: "8084"
    networks:
      - otelverse-network
    depends_on:
      clickhouse:
        condition: service_healthy

  robotics-sim:
    build:
      context: ../../../../
      dockerfile: packages/robotics-sdk/docker/simulation-env/Dockerfile
    networks:
      - otelverse-network
    depends_on:
      otel-collector:
        condition: service_started
