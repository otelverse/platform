---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-express-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: express-app
  template:
    metadata:
      labels:
        app: express-app
    spec:
      containers:
        - name: express-app
          image: "{{ .Values.sampleApps.expressApp.image }}:{{ .Values.sampleApps.expressApp.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ .Release.Name }}-collector:4318"
            - name: OTEL_SERVICE_NAME
              value: "express-app"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-express-app
spec:
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  selector:
    app: express-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-react-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react-app
  template:
    metadata:
      labels:
        app: react-app
    spec:
      containers:
        - name: react-app
          image: "{{ .Values.sampleApps.reactApp.image }}:{{ .Values.sampleApps.reactApp.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-react-app
spec:
  type: NodePort
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30000
      protocol: TCP
  selector:
    app: react-app
